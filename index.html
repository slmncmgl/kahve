<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahve Seçimi | Bilimevi IT</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #fff5ed 0%, #ffffff 100%);
            min-height: 100vh;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ÖNEMLİ: BURAYI DEĞİŞTİR ---
        // Formspree'den aldığın ID'yi buraya yapıştır (Örn: "mqkrpvwz")
        // Eğer bu ID "your-id" olarak kalırsa gönderim hatası alırsınız.
        const FORMSPREE_ID = "your-id"; 
        const TARGET_EMAIL = "it@bilimevi.com";

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const coffeeData = [
            { id: 1, name: "Guatemala", notes: "Fındık, Çikolata", intensity: 2 },
            { id: 2, name: "Nicaragua", notes: "Tatlı, Badem", intensity: 3 },
            { id: 3, name: "Ethiopia", notes: "Çiçeksi, Turunç", intensity: 4 },
            { id: 4, name: "Panama", notes: "Yemiş, Meyve", intensity: 2 },
            { id: 5, name: "Honduras", notes: "Kakao, Pekmez", intensity: 3 },
            { id: 6, name: "Brazil", notes: "Çikolata, Üzüm", intensity: 3 },
            { id: 7, name: "Sumatra", notes: "Baharatlı, İsli", intensity: 5 },
            { id: 8, name: "Costa Rica", notes: "Turunç, Pekmez", intensity: 4 }
        ];

        const generateTimeSlots = () => {
            const slots = [];
            const now = new Date();
            const currentHour = now.getHours();
            const currentMin = now.getMinutes();

            for (let hour = 10; hour <= 17; hour++) {
                for (let min = 0; min < 60; min += 15) {
                    if (hour === 17 && min > 0) break;
                    
                    // Geçmiş saatleri filtrele
                    if (hour < currentHour || (hour === currentHour && min <= currentMin)) {
                        continue;
                    }

                    const h = hour.toString().padStart(2, '0');
                    const m = min.toString().padStart(2, '0');
                    slots.push(`${h}:${m}`);
                }
            }
            return slots;
        };

        const App = () => {
            const [selectedCoffee, setSelectedCoffee] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [isOrdering, setIsOrdering] = useState(false);
            const [isOrdered, setIsOrdered] = useState(false);
            const [statusMessage, setStatusMessage] = useState("");
            const [timeSlots, setTimeSlots] = useState([]);

            useEffect(() => {
                setTimeSlots(generateTimeSlots());
            }, [selectedCoffee]);

            const handleOrder = async () => {
                if (!selectedTime) return;
                
                setIsOrdering(true);
                setStatusMessage("");
                
                try {
                    // Formspree üzerinden gerçek mail gönderimi
                    const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            kahve: selectedCoffee.name,
                            saat: selectedTime,
                            not: selectedCoffee.notes,
                            alici: TARGET_EMAIL
                        })
                    });

                    if (response.ok) {
                        setIsOrdered(true);
                    } else {
                        // Eğer ID yanlışsa veya ayarlanmamışsa buraya düşer
                        if (FORMSPREE_ID === "your-id") {
                            setStatusMessage("Hata: FORMSPREE_ID henüz ayarlanmamış. Lütfen kodu düzenleyin.");
                        } else {
                            setStatusMessage("Gönderim hatası. Lütfen Formspree ayarlarınızı kontrol edin.");
                        }
                    }
                } catch (err) {
                    console.error("Mail hatası:", err);
                    setStatusMessage("Bağlantı hatası oluştu. Lütfen tekrar deneyin.");
                } finally {
                    setIsOrdering(false);
                }
            };

            if (isOrdered) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center animate-in fade-in zoom-in duration-500">
                        <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 shadow-lg">
                            <Icon name="check-circle" className="w-12 h-12" />
                        </div>
                        <h1 className="text-4xl font-extrabold text-slate-900 mb-2 font-serif">Sipariş İletildi!</h1>
                        <p className="text-slate-500 mb-2 text-lg">
                            <span className="font-bold text-orange-600">{selectedCoffee.name}</span> tercihiniz onaylandı.
                        </p>
                        <p className="text-slate-400 mb-8 max-w-sm mx-auto">
                            Seçim detayları IT birimine e-posta olarak gönderildi.
                        </p>
                        <button 
                            onClick={() => {setIsOrdered(false); setSelectedCoffee(null); setSelectedTime(null);}}
                            className="px-10 py-4 bg-slate-900 text-white rounded-2xl font-semibold hover:bg-slate-800 transition-all shadow-xl"
                        >
                            Yeni Seçim Yap
                        </button>
                    </div>
                );
            }

            if (selectedCoffee) {
                return (
                    <div className="min-h-screen p-6 max-w-2xl mx-auto flex flex-col justify-center animate-in slide-in-from-bottom-10 duration-500 py-12">
                        <button onClick={() => setSelectedCoffee(null)} className="flex items-center gap-2 text-slate-400 mb-6 hover:text-slate-900 transition-colors w-fit group">
                            <Icon name="arrow-left" className="w-4 h-4 group-hover:-translate-x-1 transition-transform" />
                            <span className="font-medium">Vazgeç ve Geri Dön</span>
                        </button>
                        
                        <div className="bg-white rounded-[40px] p-8 md:p-10 shadow-2xl shadow-orange-900/5 border border-slate-100 space-y-8">
                            <div className="flex items-center gap-6">
                                <div className="w-24 h-24 bg-gradient-to-br from-orange-400 to-amber-500 text-white rounded-3xl flex items-center justify-center shadow-lg shadow-orange-200">
                                    <Icon name={selectedCoffee.id === 0 ? "sparkles" : "coffee"} className="w-12 h-12" />
                                </div>
                                <div>
                                    <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">{selectedCoffee.name}</h2>
                                    <p className="text-orange-600 font-semibold text-lg">{selectedCoffee.notes}</p>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div className="flex items-center justify-between border-b border-slate-50 pb-4">
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="clock" className="w-5 h-5 text-orange-500" />
                                        Müsait Saat Seçin
                                    </h3>
                                </div>
                                
                                {timeSlots.length > 0 ? (
                                    <div className="grid grid-cols-4 sm:grid-cols-6 gap-2 h-40 overflow-y-auto pr-2 no-scrollbar border-b border-slate-50 pb-4">
                                        {timeSlots.map(time => (
                                            <button
                                                key={time}
                                                onClick={() => setSelectedTime(time)}
                                                className={`py-2 rounded-xl text-sm font-bold transition-all border ${
                                                    selectedTime === time 
                                                    ? 'bg-orange-500 text-white border-orange-500 shadow-md scale-105' 
                                                    : 'bg-white text-slate-500 border-slate-100 hover:border-orange-200'
                                                }`}
                                            >
                                                {time}
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="p-4 bg-orange-50 text-orange-800 rounded-2xl text-center font-medium">
                                        Bugün için tadım saati kalmadı. Yarın tekrar bekleriz!
                                    </div>
                                )}
                            </div>

                            {statusMessage && (
                                <div className="p-3 bg-red-50 text-red-600 text-center text-sm font-bold rounded-xl border border-red-100">
                                    {statusMessage}
                                </div>
                            )}

                            <button 
                                onClick={handleOrder}
                                disabled={!selectedTime || isOrdering || timeSlots.length === 0}
                                className={`w-full py-5 text-white font-bold text-xl rounded-2xl transition-all shadow-lg transform active:scale-95 flex items-center justify-center gap-3 ${
                                    selectedTime && !isOrdering ? 'bg-slate-900 hover:bg-slate-800 shadow-slate-900/20' : 'bg-slate-200 text-slate-400'
                                }`}
                            >
                                {isOrdering ? (
                                    <><Icon name="loader-2" className="w-6 h-6 animate-spin" /> İletiliyor...</>
                                ) : (
                                    <><Icon name="send" className="w-5 h-5 text-amber-400" /> {selectedTime ? `${selectedTime} için Siparişi Gönder` : 'Saat Seçin'}</>
                                )}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-5xl mx-auto py-16 md:py-24">
                    <header className="mb-16 text-center space-y-4">
                        <div className="inline-block px-4 py-1.5 bg-orange-100 text-orange-700 rounded-full text-xs font-black uppercase tracking-widest mb-2 animate-pulse">
                            Bilimevi Coffee Studio
                        </div>
                        <h1 className="text-5xl md:text-7xl font-serif font-black text-slate-900 tracking-tighter leading-none">
                            Kahve Ritüelinizi <br/>
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-500">Tasarlayın</span>
                        </h1>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Kahvece Bilmiyorum Kartı */}
                        <div 
                            onClick={() => setSelectedCoffee({ id: 0, name: "Kahvece Bilmiyorum", notes: "Günün sürpriz seçimi", intensity: 3 })}
                            className="bg-slate-900 p-8 rounded-[35px] border border-slate-800 hover:shadow-2xl transition-all cursor-pointer flex items-center justify-between group relative overflow-hidden"
                        >
                            <div className="flex items-center gap-6 relative z-10">
                                <div className="w-16 h-16 bg-white/10 text-amber-400 rounded-[22px] flex items-center justify-center group-hover:bg-amber-400 group-hover:text-slate-900 transition-all">
                                    <Icon name="sparkles" className="w-8 h-8" />
                                </div>
                                <div>
                                    <h3 className="font-extrabold text-2xl text-white">Kahvece Bilmiyorum</h3>
                                    <p className="text-slate-400 font-medium italic">Sizin için biz seçelim</p>
                                </div>
                            </div>
                        </div>

                        {coffeeData.map(coffee => (
                            <div 
                                key={coffee.id}
                                onClick={() => setSelectedCoffee(coffee)}
                                className="bg-white p-8 rounded-[35px] border border-slate-100 hover:border-orange-200 hover:shadow-2xl transition-all cursor-pointer flex items-center justify-between group"
                            >
                                <div className="flex items-center gap-6">
                                    <div className="w-16 h-16 bg-slate-50 text-slate-400 rounded-[22px] flex items-center justify-center group-hover:bg-orange-50 group-hover:text-orange-500 transition-all shadow-sm">
                                        <Icon name="coffee" className="w-8 h-8" />
                                    </div>
                                    <div>
                                        <h3 className="font-extrabold text-2xl text-slate-900 group-hover:text-orange-600 transition-colors tracking-tight">{coffee.name}</h3>
                                        <p className="text-slate-400 font-medium">{coffee.notes}</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" className="w-6 h-6 text-slate-300 group-hover:text-orange-600" />
                            </div>
                        ))}
                    </div>

                    <footer className="mt-24 text-center">
                        <p className="text-slate-300 text-xs font-bold uppercase tracking-[0.3em]">&copy; 2024 Coffee Ritual Studio | IT Delivery</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
