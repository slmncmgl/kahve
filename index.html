<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahve Seçimi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfcfc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const coffeeData = [
            { id: 1, name: "Guatemala", notes: "Fındık, Çikolata", intensity: 2 },
            { id: 2, name: "Nicaragua", notes: "Tatlı, Badem", intensity: 3 },
            { id: 3, name: "Ethiopia", notes: "Çiçeksi, Turunç", intensity: 4 },
            { id: 4, name: "Panama", notes: "Yemiş, Meyve", intensity: 2 },
            { id: 5, name: "Honduras", notes: "Kakao, Pekmez", intensity: 3 },
            { id: 6, name: "Brazil", notes: "Çikolata, Üzüm", intensity: 3 },
            { id: 7, name: "Sumatra", notes: "Baharatlı, İsli", intensity: 5 },
            { id: 8, name: "Costa Rica", notes: "Turunç, Pekmez", intensity: 4 }
        ];

        const App = () => {
            const [selectedCoffee, setSelectedCoffee] = useState(null);
            const [isOrdered, setIsOrdered] = useState(false);

            if (isOrdered) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center animate-in fade-in zoom-in duration-500">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
                            <Icon name="check" className="w-10 h-10" />
                        </div>
                        <h1 className="text-3xl font-extrabold text-slate-900 mb-2">Siparişiniz Alındı!</h1>
                        <p className="text-slate-500 mb-8">En kısa sürede hazırlamaya başlıyoruz.</p>
                        <button 
                            onClick={() => {setIsOrdered(false); setSelectedCoffee(null);}}
                            className="px-8 py-3 bg-slate-900 text-white rounded-2xl font-semibold hover:bg-slate-800 transition-colors"
                        >
                            Ana Sayfaya Dön
                        </button>
                    </div>
                );
            }

            if (selectedCoffee) {
                return (
                    <div className="min-h-screen p-6 max-w-lg mx-auto flex flex-col justify-center animate-in slide-in-from-bottom-10 duration-500">
                        <button 
                            onClick={() => setSelectedCoffee(null)}
                            className="flex items-center gap-2 text-slate-400 mb-8 hover:text-slate-900 transition-colors"
                        >
                            <Icon name="arrow-left" className="w-4 h-4" />
                            <span>Geri Dön</span>
                        </button>
                        
                        <div className="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100 space-y-6">
                            <div className="w-20 h-20 bg-orange-50 text-orange-600 rounded-3xl flex items-center justify-center">
                                <Icon name="coffee" className="w-10 h-10" />
                            </div>
                            
                            <div>
                                <h2 className="text-4xl font-extrabold text-slate-900">{selectedCoffee.name}</h2>
                                <p className="text-slate-500 mt-2 text-lg">{selectedCoffee.notes}</p>
                            </div>

                            <div className="flex items-center gap-4 py-4 border-y border-slate-50">
                                <span className="text-sm font-bold text-slate-400 uppercase tracking-widest">Yoğunluk</span>
                                <div className="flex gap-1">
                                    {[1, 2, 3, 4, 5].map(i => (
                                        <div key={i} className={`w-3 h-3 rounded-full ${i <= selectedCoffee.intensity ? 'bg-orange-400' : 'bg-slate-100'}`} />
                                    ))}
                                </div>
                            </div>

                            <button 
                                onClick={() => setIsOrdered(true)}
                                className="w-full py-5 bg-orange-600 text-white font-bold text-xl rounded-2xl hover:bg-orange-700 transition-all shadow-lg shadow-orange-600/20 transform active:scale-95"
                            >
                                Sipariş Ver
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-4xl mx-auto py-20">
                    <header className="mb-12 text-center">
                        <h1 className="text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Kahve tercihinizi yapın</h1>
                        <p className="text-slate-400 text-lg">Gününüzü güzelleştirecek çekirdeği seçin.</p>
                    </header>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {coffeeData.map(coffee => (
                            <div 
                                key={coffee.id}
                                onClick={() => setSelectedCoffee(coffee)}
                                className="bg-white p-6 rounded-3xl border border-slate-100 hover:border-orange-200 hover:shadow-xl hover:shadow-orange-900/5 transition-all cursor-pointer flex items-center justify-between group"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-orange-50 group-hover:text-orange-500 transition-colors">
                                        <Icon name="coffee" />
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-xl text-slate-900">{coffee.name}</h3>
                                        <p className="text-sm text-slate-400">{coffee.notes}</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" className="w-5 h-5 text-slate-200 group-hover:text-orange-500 group-hover:translate-x-1 transition-all" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
